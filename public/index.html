<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تجربة لعبة المافيا - WiFi</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: #10131a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 520px;
      background: #171b25;
      border: 1px solid #2b3242;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 35px rgba(0,0,0,.35);
    }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .hint { color: #b8c0d5; line-height: 1.7; margin-bottom: 16px; }
    .row { display: flex; gap: 8px; margin: 10px 0; }
    input, button {
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
    }
    input { flex: 1; outline: none; background: #eef2ff; color: #111827; }
    button { background: #4f46e5; color: white; font-weight: 700; cursor: pointer; }
    button.secondary { background: #334155; }
    button.danger { background: #be123c; }
    button:active { transform: scale(.98); }
    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #7f1d1d;
      margin: 8px 0 14px;
      font-size: 14px;
    }
    .status.ok { background: #166534; }
    .card {
      background: #0f172a;
      border: 1px solid #263044;
      border-radius: 18px;
      padding: 14px;
      margin-top: 12px;
    }
    .role {
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      padding: 18px;
      border-radius: 16px;
      background: #1e293b;
      margin-top: 10px;
    }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 11px 8px;
      border-bottom: 1px solid #253149;
    }
    li:last-child { border-bottom: 0; }
    .small { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <main class="app">
    <h1>تجربة ربط لعبة المافيا</h1>
    <div id="status" class="status">غير متصل</div>
    <p class="hint">دخل الاسم ديالك، ومن بعد غادي يبان عند جميع الناس لي داخلين لنفس الرابط ف نفس الويفي.</p>

    <div class="row">
      <input id="nameInput" placeholder="كتب سميتك هنا" maxlength="20" />
      <button id="joinBtn">دخول</button>
    </div>

    <div class="row">
      <button id="assignBtn">وزع الأدوار للتجربة</button>
      <button id="clearBtn" class="secondary">مسح الأدوار</button>
    </div>

    <section class="card">
      <div class="small">الدور ديالي:</div>
      <div id="myRole" class="role">لم يتم التوزيع بعد</div>
    </section>

    <section class="card">
      <h2 style="margin:0 0 10px;font-size:18px;">اللائحة المتصلة</h2>
      <ul id="playersList"></ul>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const statusEl = document.getElementById('status');
    const nameInput = document.getElementById('nameInput');
    const joinBtn = document.getElementById('joinBtn');
    const assignBtn = document.getElementById('assignBtn');
    const clearBtn = document.getElementById('clearBtn');
    const playersList = document.getElementById('playersList');
    const myRole = document.getElementById('myRole');

    const savedName = localStorage.getItem('mafiaName') || '';
    nameInput.value = savedName;

    socket.on('connect', () => {
      statusEl.textContent = 'متصل بالسيرفر';
      statusEl.classList.add('ok');
      if (nameInput.value.trim()) socket.emit('join', nameInput.value.trim());
    });

    socket.on('disconnect', () => {
      statusEl.textContent = 'انقطع الاتصال';
      statusEl.classList.remove('ok');
    });

    joinBtn.onclick = () => {
      const name = nameInput.value.trim();
      if (!name) return alert('كتب سميتك أولا');
      localStorage.setItem('mafiaName', name);
      socket.emit('join', name);
    };

    assignBtn.onclick = () => socket.emit('assignRoles');
    clearBtn.onclick = () => socket.emit('clearRoles');

    socket.on('myRole', (role) => {
      myRole.textContent = role || 'لم يتم التوزيع بعد';
    });

    socket.on('state', ({ players }) => {
      playersList.innerHTML = '';
      if (!players.length) {
        playersList.innerHTML = '<li>لا يوجد لاعبون حاليا</li>';
        return;
      }
      for (const p of players) {
        const li = document.createElement('li');
        const name = document.createElement('strong');
        name.textContent = p.name;
        const role = document.createElement('span');
        role.className = 'small';
        role.textContent = p.role ? 'تم توزيع الدور' : 'بدون دور';
        li.appendChild(name);
        li.appendChild(role);
        playersList.appendChild(li);
      }
    });
  </script>
</body>
</html>
